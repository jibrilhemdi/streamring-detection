# Contributor-local overrides. Copy to configs/local.yaml and edit.
# Do not commit configs/local.yaml.
project:
  name: streamring
  seed: 42
  device: cpu

data:
  bigquery_project: "bigquery-public-data"
  billing_project: ""  # Optional; defaults to GOOGLE_CLOUD_PROJECT or ADC project
  bigquery_dataset: "crypto_ethereum_classic"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  graph_dir: "data/graphs"
  embedding_dir: "data/embeddings"

training:
  max_epochs: 100
  batch_size: 256
